name: deploy

# Auto-deploys to Fly.io after the `tests` workflow succeeds on main.
# This way a red test on main blocks the deploy automatically.
#
# Setup (one time):
#   1. Create a long-lived deploy token:
#        fly tokens create deploy -x 999999h
#   2. Add it as a repo secret named `FLY_API_TOKEN`:
#        gh secret set FLY_API_TOKEN
#
# If FLY_API_TOKEN is not set, this workflow exits cleanly with a no-op
# so the repo can be cloned/forked without a broken deploy job.

on:
  workflow_run:
    workflows: ["tests"]
    branches: [main]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Fly.io
    runs-on: ubuntu-latest
    # Skip if upstream tests failed. workflow_dispatch always passes this gate.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check FLY_API_TOKEN
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [[ -z "$FLY_API_TOKEN" ]]; then
            echo "FLY_API_TOKEN not set — skipping deploy. Set it with: gh secret set FLY_API_TOKEN"
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup flyctl
        if: steps.check.outputs.skip == '0'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: steps.check.outputs.skip == '0'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Smoke test
        if: steps.check.outputs.skip == '0'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Give Fly's healthcheck a moment to swing the new machine into rotation
          # before we hammer it. fly-smoke.sh has its own retry budget.
          sleep 10
          scripts/fly-smoke.sh
