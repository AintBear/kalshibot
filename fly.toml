# Fly.io config for Sibylla backend.
#
# Deploy with:
#   fly auth login
#   fly launch --copy-config --no-deploy   # first time only; accept the existing fly.toml
#   fly volumes create sibylla_data --region iad --size 1
#   fly volumes create sibylla_config --region iad --size 1
#   fly deploy                            # creates the first Machine with automation off by default
#   scripts/fly-bootstrap-secrets.sh      # uploads Kalshi key + settings
#   fly machine restart --app sibylla-kalshibot
#
# This runs ONE backend instance because the database is SQLite (single
# writer). Never auto-scale this past 1.

app = "sibylla-kalshibot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  ENVIRONMENT = "production"
  DATABASE_URL = "sqlite:////app/data/sibylla.db"
  DB_PATH = "/app/data/sibylla.db"
  CONFIG_PATH = "/app/config/settings.json"
  PYTHONUNBUFFERED = "1"

[[mounts]]
  source = "sibylla_data"
  destination = "/app/data"

[[mounts]]
  source = "sibylla_config"
  destination = "/app/config"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the machine running 24/7 — the bot's job is the scheduled scan loop,
  # which only fires when the process is alive. Don't auto-stop on idle.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"
